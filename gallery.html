<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Access Protection -->
<script>

if(
!localStorage.getItem(
"galleryUnlocked"
)
){
window.location.href =
"index.html";
}

</script>

<!-- Floating Hearts -->
<div class="hearts">
    <span>❤️</span>
    <span>💖</span>
    <span>💕</span>
    <span>💗</span>
    <span>💞</span>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music/sanamterikasam.mp3" type="audio/mpeg">
</audio>

<section class="gallery-page">

    <div class="progress">

        <div class="step-active">
            📸 Step 1 / 4
        </div>

    </div>

    <h1 class="page-title">
        Our Beautiful Memories ❤️
    </h1>

    <p class="page-subtitle">
        Every picture tells a story,
        every memory has a special place in my heart. 💖
    </p>

    <div class="gallery-container">

        <!-- Photo 1 -->
        <div class="polaroid rotate-left">

            <img
            src="images/photo1.jpg"
            alt="Memory 1">

            <p>
                The beginning of something beautiful ✨
            </p>

        </div>

        <!-- Photo 2 -->
        <div class="polaroid rotate-right">

            <img
            src="images/photo2.jpg"
            alt="Memory 2">

            <p>
                Happiness looks good on you ❤️
            </p>

        </div>

        <!-- Photo 3 -->
        <div class="polaroid rotate-left">

            <img
            src="images/photo3.jpg"
            alt="Memory 3">

            <p>
                A smile I'll never forget 😊
            </p>

        </div>

        <!-- Photo 4 -->
        <div class="polaroid rotate-right">

            <img
            src="images/photo4.jpg"
            alt="Memory 4">

            <p>
                Beautiful moments deserve memories 💕
            </p>

        </div>

        <!-- Photo 5 -->
        <div class="polaroid rotate-left">

            <img
            src="images/photo5.jpg"
            alt="Memory 5">

            <p>
                Forever special 🌹
            </p>

        </div>

    </div>

    <div class="bottom-buttons">

        <a
        href="index.html"
        class="btn">
        ⬅ Back
        </a>

        <button
        class="btn"
        onclick="goToLetter()">
        Continue ➜ 💌
        </button>

    </div>

</section>

<script src="script.js"></script>

<script>

function goToLetter(){

localStorage.setItem(
"letterUnlocked",
"true"
);

document.body.classList.add(
"fade-out"
);

setTimeout(()=>{

window.location.href =
"letter.html";

},800);

}

</script>

</body>
</html>
